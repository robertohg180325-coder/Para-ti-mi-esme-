<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love</title>
</head>
<body style="margin:0; background:black; overflow:hidden;">

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rotation = 0;

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y: 13*Math.cos(t)
           -5*Math.cos(2*t)
           -2*Math.cos(3*t)
           -Math.cos(4*t)
    };
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ff1493";
    ctx.font = "18px Arial";
    ctx.textAlign = "center";

    for(let t=0; t<Math.PI*2; t+=0.2){

        let p = heart(t + rotation);

        let x = p.x * 8;   // más pequeño para que seguro quepa
        let y = p.y * 8;

        ctx.fillText(
            "I love you",
            canvas.width/2 + x,
            canvas.height/2 - y
        );
    }

    rotation += 0.002; // lento
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
